<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 280" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect x="10" y="40" width="380" height="200" rx="12" fill="#1e3a8a" fill-opacity="0.18" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="200" y="70" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="bold">ブラウザ（JavaScript）</text>
  <rect x="50" y="100" width="300" height="120" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="146" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">メモリ上のみ</text>
  <text x="200" y="180" text-anchor="middle" fill="#93c5fd" font-size="18">リロードで消える</text>

  <rect x="500" y="40" width="780" height="200" rx="12" fill="#155e75" fill-opacity="0.18" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="890" y="70" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー（Python / FastAPI）</text>
  <rect x="540" y="100" width="280" height="120" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="680" y="166" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">処理</text>

  <line x1="825" y1="160" x2="935" y2="160" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="940" y="100" width="300" height="120" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="3"/>
  <text x="1090" y="146" text-anchor="middle" fill="#a7f3d0" font-size="20" font-weight="bold">Database</text>
  <text x="1090" y="180" text-anchor="middle" fill="#a7f3d0" font-size="18">（SQLite）</text>

  <line x1="395" y1="135" x2="495" y2="135" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="445" y="124" text-anchor="middle" fill="#93c5fd" font-size="16">HTTP リクエスト</text>

  <line x1="495" y1="200" x2="395" y2="200" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="445" y="220" text-anchor="middle" fill="#a7f3d0" font-size="16">JSON レスポンス</text>
</svg>
