<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 280" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
  </defs>

  <rect x="10" y="100" width="300" height="160" rx="12" fill="#1e3a8a" fill-opacity="0.18" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="160" y="130" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="bold">ブラウザ（クライアント）</text>
  <rect x="40" y="150" width="240" height="90" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="184" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">let todos = []</text>
  <text x="160" y="216" text-anchor="middle" fill="#93c5fd" font-size="16">（メモリ上のデータ）</text>

  <line x1="315" y1="195" x2="365" y2="195" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="370" y="150" width="220" height="90" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="200" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">リロード（F5）</text>

  <line x1="595" y1="195" x2="645" y2="195" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="650" y="150" width="220" height="90" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="760" y="186" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">JSが</text>
  <text x="760" y="214" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">最初から実行</text>

  <line x1="875" y1="195" x2="925" y2="195" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="930" y="150" width="220" height="90" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="1040" y="186" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">todosは</text>
  <text x="1040" y="214" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">空に戻る</text>

  <line x1="1040" y1="120" x2="1040" y2="60" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrow-red)"/>

  <rect x="900" y="10" width="280" height="60" rx="10" fill="#7f1d1d" stroke="#dc2626" stroke-width="3"/>
  <text x="1040" y="48" text-anchor="middle" fill="#fecaca" font-size="20" font-weight="bold">データは全て失われる</text>
</svg>
