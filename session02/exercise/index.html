<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自己紹介ページ</title>
  </head>
  <body>
    <!-- ============================================
         実習2: 基本的なHTMLページ
         まずは以下のh1とpを自分の内容に書き換えてみよう
    ============================================ -->
    <h1>はじめてのWebページ</h1>
    <p>HTMLの勉強を始めました！</p>

    <!-- ============================================
         実習3: 自己紹介ページを作ろう
         以下のTODOコメントに従って、内容を追加してください
    ============================================ -->

    <!-- ============================================
         実習4: セマンティックタグで構造化しよう
         上で書いた内容を、以下のセマンティックタグで囲み直してください

         ヒント: 以下の構造にしてみよう
         <header>
             <h1>名前</h1>
         </header>
         <main>
             <section>
                 <h2>自己紹介</h2>
                 <p>...</p>
             </section>
             <section>
                 <h2>趣味</h2>
                 <ul>...</ul>
             </section>
             <section>
                 <h2>好きなサイト</h2>
                 <a>...</a>
             </section>
         </main>
         <footer>
             <p>&copy; 2026 あなたの名前</p>
         </footer>
    ============================================ -->

    <header>
      <!-- TODO: h1タグで自分の名前を見出しとして書いてみよう -->
      <h1>山田太郎の自己紹介</h1>
    </header>

    <main>
      <section>
        <h2>自己紹介</h2>
        <!-- TODO: pタグで自己紹介文を2〜3文書いてみよう -->
        <p>情報学部の1年生です。</p>
        <p>開発に興味があって、最近HTMLの勉強を始めました。</p>
        <p>よろしくお願いします。</p>
      </section>

      <section>
        <!-- TODO: h2タグで「趣味」という見出しを作ろう -->
        <h2>趣味</h2>

        <!-- TODO: ul と li タグで趣味のリストを3つ以上書いてみよう -->
        <ul>
          <li>プログラミング</li>
          <li>読書</li>
          <li>映画鑑賞</li>
        </ul>
      </section>

      <section>
        <!-- TODO: h2タグで「好きなサイト」という見出しを作ろう -->
        <h2>好きなサイト</h2>

        <!-- TODO: aタグで好きなWebサイトへのリンクを1つ以上作ろう -->
        <ul>
          <li><a href="https://github.com" target="_blank">GitHub</a></li>
          <li><a href="https://www.google.com" target="_blank">Google</a></li>
        </ul>
      </section>

      <!-- ============================================
           実習5: お問い合わせフォームを追加しよう
           以下のTODOに従って、フォームを作成してください
      ============================================ -->

      <!-- TODO: sectionタグで「お問い合わせ」セクションを作ろう -->
      <!-- TODO: formタグの中に以下を作成:
           1. 名前の入力欄（type="text"）+ labelタグ
           2. メールアドレスの入力欄（type="email"）+ labelタグ
           3. 送信ボタン（button type="submit"）
      -->
      <section>
        <h2>お問い合わせ</h2>
        <form>
          <div>
            <label for="name">名前:</label>
            <input type="text" id="name" placeholder="山田太郎" />
          </div>
          <div>
            <label for="email">メールアドレス:</label>
            <input type="email" id="email" placeholder="example@mail.com" />
          </div>
          <div>
            <button type="submit">送信</button>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 山田太郎</p>
    </footer>
  </body>
</html>
