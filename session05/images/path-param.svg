<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect x="10" y="20" width="440" height="80" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="52" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ブラウザ（クライアント）</text>
  <text x="230" y="80" text-anchor="middle" fill="#93c5fd" font-size="15">URL: http://localhost:8000/hello/田中</text>

  <rect x="790" y="20" width="440" height="80" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="1010" y="52" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー（Python / FastAPI）</text>
  <text x="1010" y="80" text-anchor="middle" fill="#93c5fd" font-size="16">hello(name="田中")</text>

  <line x1="230" y1="100" x2="230" y2="430" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1010" y1="100" x2="1010" y2="430" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <line x1="230" y1="150" x2="1008" y2="150" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="620" y="138" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">HTTPリクエスト  GET /hello/田中</text>

  <rect x="540" y="180" width="690" height="160" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="885" y="212" text-anchor="middle" fill="#451a03" font-size="18" font-weight="bold" font-family="'Menlo', 'Consolas', monospace">@app.get("/hello/{name}")</text>
  <text x="885" y="244" text-anchor="middle" fill="#451a03" font-size="18" font-weight="bold" font-family="'Menlo', 'Consolas', monospace">def hello(name: str):</text>
  <text x="885" y="276" text-anchor="middle" fill="#451a03" font-size="18" font-weight="bold" font-family="'Menlo', 'Consolas', monospace">  return {"message":</text>
  <text x="885" y="306" text-anchor="middle" fill="#451a03" font-size="18" font-weight="bold" font-family="'Menlo', 'Consolas', monospace">    "こんにちは、田中さん！"}</text>

  <line x1="1010" y1="390" x2="232" y2="390" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="620" y="378" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="bold">JSON応答を返す</text>
</svg>
