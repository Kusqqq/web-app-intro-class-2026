<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect x="10" y="20" width="500" height="240" rx="12" fill="#1e3a8a" fill-opacity="0.18" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="260" y="50" text-anchor="middle" fill="#93c5fd" font-size="22" font-weight="bold">ブラウザ（クライアント）</text>
  <rect x="50" y="90" width="420" height="150" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="140" text-anchor="middle" fill="#dbeafe" font-size="22" font-weight="bold">HTML + CSS + JS</text>
  <text x="260" y="190" text-anchor="middle" fill="#93c5fd" font-size="20">見た目を担当</text>

  <rect x="690" y="20" width="500" height="240" rx="12" fill="#155e75" fill-opacity="0.18" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="940" y="50" text-anchor="middle" fill="#cffafe" font-size="22" font-weight="bold">サーバー（バックエンド）</text>
  <rect x="730" y="90" width="420" height="150" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="940" y="140" text-anchor="middle" fill="#cffafe" font-size="22" font-weight="bold">Python（FastAPI）</text>
  <text x="940" y="190" text-anchor="middle" fill="#93c5fd" font-size="20">データ・処理を担当</text>

  <line x1="510" y1="130" x2="690" y2="130" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="600" y="118" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">HTTP</text>

  <line x1="690" y1="190" x2="510" y2="190" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="600" y="210" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="bold">JSON応答</text>
</svg>
