<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="10" y="20" width="500" height="220" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="260" y="52" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">Python（辞書 / dict）</text>
  <text x="260" y="100" text-anchor="middle" fill="#cffafe" font-size="20" font-family="'Menlo','Consolas',monospace">{</text>
  <text x="260" y="130" text-anchor="middle" fill="#cffafe" font-size="20" font-family="'Menlo','Consolas',monospace">  'id': 1,</text>
  <text x="260" y="160" text-anchor="middle" fill="#cffafe" font-size="20" font-family="'Menlo','Consolas',monospace">  'title': '...',</text>
  <text x="260" y="190" text-anchor="middle" fill="#cffafe" font-size="20" font-family="'Menlo','Consolas',monospace">  'done': False</text>
  <text x="260" y="220" text-anchor="middle" fill="#cffafe" font-size="20" font-family="'Menlo','Consolas',monospace">}</text>

  <line x1="525" y1="130" x2="685" y2="130" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="605" y="118" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="bold">変換</text>

  <rect x="690" y="20" width="500" height="220" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="940" y="52" text-anchor="middle" fill="#a7f3d0" font-size="20" font-weight="bold">JSON</text>
  <text x="940" y="100" text-anchor="middle" fill="#a7f3d0" font-size="20" font-family="'Menlo','Consolas',monospace">{</text>
  <text x="940" y="130" text-anchor="middle" fill="#a7f3d0" font-size="20" font-family="'Menlo','Consolas',monospace">  "id": 1,</text>
  <text x="940" y="160" text-anchor="middle" fill="#a7f3d0" font-size="20" font-family="'Menlo','Consolas',monospace">  "title": "...",</text>
  <text x="940" y="190" text-anchor="middle" fill="#a7f3d0" font-size="20" font-family="'Menlo','Consolas',monospace">  "done": false</text>
  <text x="940" y="220" text-anchor="middle" fill="#a7f3d0" font-size="20" font-family="'Menlo','Consolas',monospace">}</text>
</svg>
