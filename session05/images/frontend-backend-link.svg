<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 400" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect x="10" y="20" width="440" height="90" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="54" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ブラウザ（フロントエンド）</text>
  <text x="230" y="86" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="'Menlo','Consolas',monospace">JavaScript / fetch("/todos")</text>

  <rect x="790" y="20" width="440" height="90" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="1010" y="54" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー（バックエンド）</text>
  <text x="1010" y="86" text-anchor="middle" fill="#93c5fd" font-size="16">Python / FastAPI</text>

  <line x1="230" y1="110" x2="230" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1010" y1="110" x2="1010" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <line x1="230" y1="160" x2="1008" y2="160" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="620" y="148" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="bold">GET /todos</text>

  <line x1="1010" y1="220" x2="232" y2="220" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#arrow-emerald)"/>
  <text x="620" y="208" text-anchor="middle" fill="#a7f3d0" font-size="20" font-weight="bold">JSON応答</text>

  <rect x="120" y="260" width="1000" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="620" y="296" text-anchor="middle" fill="#451a03" font-size="18" font-weight="bold">サーバー: todos = [...] → return todos</text>
  <text x="620" y="332" text-anchor="middle" fill="#451a03" font-size="18" font-weight="bold">ブラウザ: データを受け取り画面に表示</text>
</svg>
